<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DueReady AI — Due Diligence Record</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --ink:#1B2E2E;
    --paper:#EDE6D6;
    --paper-2:#E1D8C2;
    --flag:#C24A1F;
    --flag-soft:#EBD0BE;
    --slate:#5B6661;
    --slate-light:#8B958E;
    --sage:#4F6650;
    --sage-soft:#DCE3D5;
    --rust:#8C2F1B;
    --rust-soft:#E8CFC2;
    --petrol:#1F4B4D;
    --petrol-soft:#D6E2DF;
    --line:#C9BD9F;
    --white:#FAF7EE;
    --shadow: 0 1px 2px rgba(27,46,46,0.06), 0 4px 14px rgba(27,46,46,0.08);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Archivo', sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background-image:
      repeating-linear-gradient(0deg, rgba(27,46,46,0.025) 0px, rgba(27,46,46,0.025) 1px, transparent 1px, transparent 3px);
  }
  .app{
    max-width: 1220px;
    margin: 0 auto;
    padding: 24px 32px 80px;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom: 20px;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 3px double var(--ink);
    padding-bottom: 14px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:38px; height:38px; flex-shrink:0;
    border: 2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono', monospace; font-size:10px; font-weight:700; color:var(--ink);
    transform: rotate(-4deg);
  }
  .brand-name{ font-family:'Oswald', sans-serif; font-weight:600; font-size: 20px; letter-spacing: 0.01em; text-transform: uppercase; }
  .brand-tag{ font-size: 10px; color: var(--slate); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; font-family:'Space Mono', monospace; }
  .org-select{ text-align:right; }
  .org-name{ font-weight:600; font-size: 14px; font-family:'Oswald', sans-serif; letter-spacing:0.01em; }
  .org-meta{ font-size: 11.5px; color: var(--slate); margin-top: 2px; font-family:'Space Mono', monospace; }

  /* ---------- Mode switch ---------- */
  .mode-switch{
    display:flex;
    gap: 0;
    margin-bottom: 22px;
    width: fit-content;
    border: 1.5px solid var(--ink);
  }
  .mode-btn{
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    cursor:pointer;
    color: var(--ink);
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family:'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .mode-btn + .mode-btn{ border-left: 1.5px solid var(--ink); }
  .mode-btn.active{ background: var(--ink); color: var(--paper); }

  /* ---------- Cycle Nav (manifest strip) ---------- */
  .cycle-wrap{
    display:flex; align-items:center; gap: 32px;
    background: var(--white); border: 1.5px solid var(--ink);
    padding: 20px 26px; margin-bottom: 22px; box-shadow: var(--shadow);
    position:relative;
  }
  .cycle-svg-holder{ flex-shrink:0; }
  .cycle-info{ flex:1; min-width:0; }
  .cycle-eyebrow{ font-family:'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--flag); margin-bottom: 6px; }
  .cycle-title{ font-family:'Oswald', sans-serif; font-size: 24px; font-weight: 600; margin: 0 0 5px; letter-spacing: 0.005em; text-transform: uppercase; }
  .cycle-desc{ font-size: 13px; color: var(--slate); line-height:1.5; max-width: 540px; margin:0; }
  .cycle-source{ font-size: 10px; color: var(--slate-light); margin-top: 9px; font-family:'Space Mono', monospace; }

  .stage-dot{ cursor:pointer; transition: transform 0.15s ease; }
  .stage-dot:hover{ transform: scale(1.06); }
  .stage-dot-bg{ fill: var(--paper-2); stroke: var(--ink); stroke-width:1.5; }
  .stage-dot.active .stage-dot-bg{ fill: var(--flag); stroke: var(--flag); }
  .stage-dot.done .stage-dot-bg{ fill: var(--sage-soft); stroke: var(--sage); }
  .stage-dot-label{ font-family:'Space Mono', monospace; font-size: 12px; font-weight: 700; fill: var(--ink); pointer-events:none; }
  .stage-dot.active .stage-dot-label{ fill: var(--white); }
  .stage-dot.done .stage-dot-label{ fill: var(--sage); }

  /* ---------- Stage tabs ---------- */
  .stage-tabs{ display:flex; gap: 0; margin-bottom: 22px; border-bottom: 1.5px solid var(--ink); overflow-x: auto; }
  .stage-tab{
    font-size: 12px; font-weight: 600; color: var(--slate); padding: 10px 16px; cursor:pointer;
    border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.15s ease;
    font-family:'Space Mono', monospace; text-transform: uppercase; letter-spacing:0.02em;
  }
  .stage-tab:hover{ color: var(--ink); }
  .stage-tab.active{ color: var(--ink); border-bottom-color: var(--flag); font-weight: 700; }

  /* ---------- Panels ---------- */
  .panel{ display:none; }
  .panel.active{ display:block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .panel-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
  .panel-h1{ font-family:'Oswald', sans-serif; font-size: 20px; font-weight: 600; margin: 0 0 4px; text-transform: uppercase; letter-spacing:0.01em; }
  .panel-sub{ font-size: 12.5px; color: var(--slate); margin:0; max-width: 600px; line-height: 1.5; }

  .grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .grid-3{ grid-template-columns: repeat(3, 1fr); }
  .grid-4{ grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 900px){ .grid-3, .grid-4{ grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 600px){ .grid, .grid-3, .grid-4{ grid-template-columns: 1fr; } }

  .card{ background: var(--white); border: 1.5px solid var(--line); padding: 16px 18px; box-shadow: var(--shadow); }
  .card-title{ font-size: 13px; font-weight: 700; margin: 0 0 4px; display:flex; align-items:center; gap:8px; }
  .card-eyebrow{ font-family:'Space Mono', monospace; font-size: 10px; color: var(--slate-light); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

  .tag{ display:inline-flex; align-items:center; gap:5px; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 2px; font-family:'Space Mono', monospace; letter-spacing: 0.02em; text-transform:uppercase; }
  .tag-done{ background: var(--sage-soft); color: var(--sage); }
  .tag-progress{ background: var(--flag-soft); color: var(--flag); }
  .tag-risk{ background: var(--rust-soft); color: var(--rust); }
  .tag-neutral{ background: var(--paper-2); color: var(--slate); }
  .tag-stakeholder{ background: var(--petrol-soft); color: var(--petrol); }

  .dot{ width:6px; height:6px; border-radius:50%; display:inline-block; }
  .dot-done{ background: var(--sage); }
  .dot-progress{ background: var(--flag); }
  .dot-risk{ background: var(--rust); }

  .pbar{ height: 7px; background: var(--paper-2); overflow:hidden; margin-top: 10px; border: 1px solid var(--line); }
  .pbar-fill{ height:100%; background: var(--flag); }
  .pbar-fill.forest{ background: var(--sage); }

  .row-list{ display:flex; flex-direction:column; gap:9px; }
  .row{ display:flex; align-items:center; justify-content:space-between; padding: 12px 14px; background: var(--paper); border: 1px solid var(--line); gap: 12px; flex-wrap:wrap; }
  .row-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .row-title{ font-size:13px; font-weight:700; }
  .row-meta{ font-size:11.5px; color:var(--slate); margin-top:2px; }

  .btn{
    font-family:'Space Mono', monospace; font-size: 11.5px; font-weight: 700; padding: 9px 16px; border-radius: 2px;
    border: 1.5px solid var(--ink); background: var(--ink); color: var(--paper); cursor:pointer; transition: opacity 0.15s ease;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .btn:hover{ opacity:0.82; }
  .btn-ghost{ background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
  .btn-ghost:hover{ background: var(--paper-2); opacity:1; }
  .btn-sm{ padding: 6px 12px; font-size: 10.5px; }

  .ai-box{
    background: var(--petrol); border-radius: 2px; padding: 16px 19px;
    color: var(--paper); position:relative; overflow:hidden;
    border-left: 4px solid var(--flag);
  }
  .ai-eyebrow{ font-family:'Space Mono', monospace; font-size: 10px; color: #E8B98A; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; position:relative; display:flex; align-items:center; gap:6px;}
  .ai-text{ font-size: 12.5px; line-height: 1.6; color: #E4ECE9; margin:0; position:relative; }
  .ai-text b{ color:#fff; font-weight:700; }

  table.dt{ width:100%; border-collapse: collapse; font-size: 12.5px; }
  table.dt th{ text-align:left; font-family:'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-light); padding: 0 10px 8px; border-bottom: 1.5px solid var(--ink); font-weight:700; }
  table.dt td{ padding: 11px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  table.dt tr:last-child td{ border-bottom:none; }

  .section-label{ font-family:'Space Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate); margin: 24px 0 12px; display:flex; align-items:center; gap:8px;}
  .section-label:first-child{ margin-top:0; }
  .section-label::before{ content:'§'; color: var(--flag); font-weight:700; }
  .section-label::after{ content:''; flex:1; height:1px; background: var(--line); }

  .scenario-banner{
    display:flex; align-items:center; gap:12px; background: var(--white); border: 1.5px dashed var(--flag);
    padding: 10px 16px; margin-bottom: 18px; font-size: 12px; color: var(--ink);
  }
  .scenario-banner b{ color: var(--flag); font-family:'Space Mono', monospace; text-transform:uppercase; font-size:11px; }

  .timeline{ position:relative; padding-left: 22px; }
  .timeline::before{ content:''; position:absolute; left: 5px; top: 4px; bottom: 4px; width: 2px; background: var(--line); }
  .tl-item{ position:relative; padding-bottom: 18px; }
  .tl-item:last-child{ padding-bottom:0; }
  .tl-dot{ position:absolute; left: -22px; top: 2px; width: 11px; height:11px; border-radius:50%; background: var(--white); border: 2px solid var(--slate-light); }
  .tl-item.done .tl-dot{ background: var(--sage); border-color: var(--sage); }
  .tl-item.current .tl-dot{ background: var(--flag); border-color: var(--flag); box-shadow: 0 0 0 3px var(--flag-soft); }
  .tl-date{ font-family:'Space Mono', monospace; font-size:10px; color:var(--slate-light); text-transform:uppercase; }
  .tl-title{ font-size: 13px; font-weight:700; margin: 2px 0 3px; }
  .tl-desc{ font-size: 12px; color:var(--slate); line-height:1.5; }

  textarea.demo-input, input.demo-input{
    width:100%; font-family:'Archivo', sans-serif; font-size: 13px; padding: 10px 12px; border: 1.5px solid var(--line);
    border-radius: 2px; background: var(--white); color: var(--ink); resize: vertical;
  }
  textarea.demo-input:focus, input.demo-input:focus{ outline: none; border-color: var(--flag); }
  label.field-label{ font-size: 11px; font-weight:700; color: var(--slate); display:block; margin-bottom: 6px; font-family:'Space Mono', monospace; text-transform:uppercase; letter-spacing:0.03em; }

  .chart-area{ height: 150px; display:flex; align-items:flex-end; gap: 10px; padding: 0 4px; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar{ width: 100%; background: var(--paper-2); position:relative; height:100px; border: 1px solid var(--line); border-bottom:none;}
  .bar-fill{ width:100%; background: var(--flag); position:absolute; bottom:0; left:0; transition: height 0.6s ease; }
  .bar-label{ font-size:10px; color: var(--slate); font-family:'Space Mono', monospace; text-transform:uppercase; }

  .footer-nav{ display:flex; justify-content:space-between; margin-top: 28px; padding-top: 18px; border-top: 1.5px solid var(--ink); }

  .empty-note{ font-size: 12px; color: var(--slate-light); font-style: italic; padding: 16px; text-align:center; }

  /* ---------- Evidence type chips ---------- */
  .evidence-chip{
    display:inline-flex; align-items:center; gap:5px; font-size: 10px; font-weight:700;
    padding: 3px 9px 3px 7px; border-radius: 2px; font-family:'Space Mono', monospace; text-transform:uppercase;
  }
  .ev-survey{ background: var(--petrol-soft); color: var(--petrol); }
  .ev-document{ background: var(--paper-2); color: var(--slate); }
  .ev-audit{ background: var(--rust-soft); color: var(--rust); }

  .evidence-row{
    border: 1px solid var(--line); padding: 13px 15px; background: var(--white);
    margin-bottom: 10px;
  }
  .evidence-row-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .evidence-title{ font-size:12.5px; font-weight:700; margin-bottom:3px; }
  .evidence-meta{ font-size:11px; color:var(--slate); font-family:'Space Mono', monospace; }

  /* ---------- Comment thread ---------- */
  .thread{ margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 12px; }
  .thread-toggle{
    font-size: 11px; font-weight: 700; color: var(--petrol); cursor: pointer; display:inline-flex; align-items:center; gap:5px;
    font-family:'Space Mono', monospace; text-transform:uppercase; letter-spacing:0.02em;
  }
  .thread-body{ display:none; margin-top: 10px; }
  .thread-body.open{ display:block; }
  .comment{ display:flex; gap:9px; margin-bottom: 11px; align-items:flex-start; }
  .comment-avatar{
    width: 26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size: 10px; font-weight:700; color:#fff; font-family:'Space Mono', monospace;
  }
  .av-sme{ background: var(--flag); }
  .av-buyer{ background: var(--petrol); }
  .av-bank{ background: var(--sage); }
  .av-auditor{ background: var(--rust); }
  .av-ai{ background: var(--ink); position:relative; }
  .comment-body{ flex:1; min-width:0; }
  .comment-name{ font-size: 11.5px; font-weight:700; }
  .comment-name .role{ font-weight:500; color: var(--slate-light); margin-left:4px; font-family:'Space Mono', monospace; text-transform:uppercase; font-size:10px; }
  .comment-text{ font-size: 12px; color: var(--ink); line-height:1.5; margin-top:2px; }
  .comment.ai-comment .comment-text{ background: var(--flag-soft); padding: 8px 10px; border-radius: 2px; margin-top:4px; }
  .comment-input-row{ display:flex; gap:8px; margin-top:8px; }
  .comment-input-row input{ flex:1; }

  /* ---------- Stakeholder selector ---------- */
  .stakeholder-bar{
    display:flex; gap:0; margin-bottom: 22px; flex-wrap:wrap; border: 1.5px solid var(--ink);
  }
  .sh-chip{
    display:flex; align-items:center; gap:8px; padding: 10px 16px; border-right: 1.5px solid var(--ink);
    background: var(--white); cursor:pointer; transition: all 0.15s ease;
  }
  .sh-chip:last-child{ border-right:none; }
  .sh-chip:hover{ background: var(--paper-2); }
  .sh-chip.active{ background: var(--ink); }
  .sh-chip.active .sh-name, .sh-chip.active .sh-meta{ color: var(--paper); }
  .sh-avatar{ width: 28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; background:var(--paper-2); }
  .sh-name{ font-size: 12px; font-weight:700; }
  .sh-meta{ font-size: 10px; color: var(--slate); font-family:'Space Mono', monospace; text-transform:uppercase; }

  .report-tabs{ display:flex; gap:0; margin-bottom: 18px; flex-wrap:wrap; border: 1px solid var(--line);}
  .report-tab{
    font-size: 11.5px; font-weight:700; padding: 9px 14px; cursor:pointer; color: var(--slate);
    background: var(--paper-2); border-right:1px solid var(--line); font-family:'Space Mono', monospace; text-transform:uppercase; letter-spacing:0.02em;
  }
  .report-tab:last-child{ border-right:none; }
  .report-tab.active{ background: var(--ink); color: var(--paper); }

  ::-webkit-scrollbar{ height:6px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:3px; }

  /* ---------- Login screen ---------- */
  .login-screen{
    min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 40px 20px;
  }
  .login-card{
    max-width: 720px; width:100%; background: var(--white); border: 1.5px solid var(--ink);
    box-shadow: var(--shadow); padding: 36px 40px;
  }
  .login-head{ display:flex; align-items:center; gap:14px; margin-bottom: 26px; border-bottom: 3px double var(--ink); padding-bottom:18px;}
  .login-head .brand-mark{ width:42px; height:42px; font-size:11px; }
  .login-title{ font-family:'Oswald', sans-serif; font-size:22px; font-weight:600; text-transform:uppercase; letter-spacing:0.01em; }
  .login-sub{ font-size:11px; color:var(--slate); font-family:'Space Mono', monospace; margin-top:2px; text-transform:uppercase; letter-spacing:0.05em;}

  .login-step-label{ font-family:'Space Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color: var(--flag); margin-bottom:12px; }

  .account-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-bottom:8px; }
  @media (max-width:560px){ .account-grid{ grid-template-columns:1fr; } }
  .account-card{
    border: 1.5px solid var(--line); padding: 14px 16px; cursor:pointer; transition: all 0.15s ease;
    display:flex; align-items:center; gap:12px; background: var(--paper);
  }
  .account-card:hover{ border-color: var(--ink); }
  .account-card-icon{ width:34px; height:34px; border-radius:50%; background:var(--paper-2); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .account-card-name{ font-size:13px; font-weight:700; }
  .account-card-meta{ font-size:10.5px; color:var(--slate); font-family:'Space Mono', monospace; text-transform:uppercase; margin-top:2px;}

  .user-list{ display:flex; flex-direction:column; gap:8px; margin-bottom: 18px; }
  .user-row{
    display:flex; align-items:center; justify-content:space-between; border: 1.5px solid var(--line);
    padding: 12px 16px; cursor:pointer; transition: all 0.15s ease; background: var(--paper);
  }
  .user-row:hover{ border-color: var(--ink); background: var(--white); }
  .user-row-left{ display:flex; align-items:center; gap:12px; }
  .user-row-avatar{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; font-family:'Space Mono', monospace; }
  .user-row-name{ font-size:13px; font-weight:700; }
  .user-row-role{ font-size:10.5px; color:var(--slate); font-family:'Space Mono', monospace; text-transform:uppercase; margin-top:1px; }
  .role-badge{
    font-size:9.5px; font-weight:700; padding:3px 8px; font-family:'Space Mono', monospace; text-transform:uppercase;
    border:1px solid currentColor;
  }
  .role-admin{ color: var(--flag); }
  .role-editor{ color: var(--petrol); }
  .role-viewer{ color: var(--slate); }

  .login-back{ font-size:11px; font-family:'Space Mono', monospace; text-transform:uppercase; color:var(--slate); cursor:pointer; display:inline-flex; align-items:center; gap:6px; margin-bottom:16px; }
  .login-back:hover{ color:var(--ink); }

  .session-bar{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    font-size:11px; color:var(--slate); margin-bottom:14px; font-family:'Space Mono', monospace; text-transform:uppercase;
  }
  .session-left{ display:flex; align-items:center; gap:10px; }
  .session-avatar{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; }
  .session-logout{ cursor:pointer; text-decoration:underline; }
  .session-logout:hover{ color:var(--ink); }

  /* viewer-locked controls */
  .locked{ opacity:0.45; cursor:not-allowed !important; position:relative; }
  .locked:hover{ opacity:0.45 !important; }
  .lock-note{ font-size:10px; color:var(--slate-light); font-family:'Space Mono', monospace; text-transform:uppercase; margin-top:6px; }

  /* ---------- Upload zone ---------- */
  .upload-zone{
    border: 1.5px dashed var(--line); padding: 22px; text-align:center; cursor:pointer; transition: all 0.15s ease;
    background: var(--paper);
  }
  .upload-zone:hover{ border-color: var(--flag); background: var(--white); }
  .upload-zone-icon{ font-size:22px; margin-bottom:8px; }
  .upload-zone-text{ font-size:12.5px; font-weight:700; }
  .upload-zone-sub{ font-size:10.5px; color:var(--slate); font-family:'Space Mono', monospace; text-transform:uppercase; margin-top:4px;}
  .doc-type-row{ display:flex; gap:8px; margin-top:14px; justify-content:center; flex-wrap:wrap; }
  .doc-type-btn{
    font-size:10.5px; font-weight:700; padding:7px 13px; border:1.5px solid var(--line); cursor:pointer;
    font-family:'Space Mono', monospace; text-transform:uppercase; background:var(--white);
  }
  .doc-type-btn:hover{ border-color: var(--ink); }
  .doc-type-btn.selected{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .upload-progress{ margin-top:14px; }

function enterApp(){

/* Helper: wrap a control so it's disabled + locked for viewer-level users */
function permGate(innerHtml, lockMessage){
  if(currentPermissions().canSubmit) return innerHtml;
  return innerHtml.replace(/<button/, '<button disabled class="locked" title="' + (lockMessage || 'Your role is read-only for this action') + '"');
}

/* =====================================================================

===================================================================== */
const STAGES = [
  { id:0, code:'01', key:'embed', title:'Embed RBC into policy', short:'Embed',
    desc:'Integrate responsible business conduct into company policies and management systems, with leadership commitment.' },
  { id:1, code:'02', key:'identify', title:'Identify & assess adverse impacts', short:'Identify & assess',
    desc:'Map actual and potential adverse impacts in operations, supply chain, and business relationships.' },
  { id:2, code:'03', key:'mitigate', title:'Cease, prevent & mitigate', short:'Mitigate',
    desc:'Stop, prevent, or reduce identified impacts through corrective action and changes in practice.' },
  { id:3, code:'04', key:'track', title:'Track implementation', short:'Track',
    desc:'Monitor whether actions are being implemented and whether adverse impacts are actually being addressed.' },
  { id:4, code:'05', key:'communicate', title:'Communicate', short:'Communicate',
    desc:'Account for how impacts are being addressed, to affected stakeholders, buyers, banks and the public.' },
  { id:5, code:'06', key:'remediate', title:'Remediate', short:'Remediate',
    desc:'Provide for or cooperate in remediation when the company has caused or contributed to adverse impacts.' },
];

const stageStatus = ['done','done','progress','progress','neutral','progress'];
let currentStage = 0;
let currentMode = 'sme';
let currentStakeholder = 'buyer';
let currentReportTab = {};

/* =====================================================================
   SVG CYCLE WHEEL
===================================================================== */
function buildCycleSvg(){
  const svg = document.getElementById('cycleSvg');
  if(!svg) return;
  const cx=86, cy=86, r=64;
  let html = '';
  html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="1.5" />`;
  for(let i=0;i<6;i++){
    const a1 = (Math.PI*2*i/6) - Math.PI/2 + 0.32;
    const a2 = (Math.PI*2*(i+1)/6) - Math.PI/2 - 0.32;
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    html += `<path d="M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}" fill="none" stroke="var(--line)" stroke-width="1.5" />`;
  }
  html += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Space Mono, monospace" font-size="9" fill="var(--slate-light)" letter-spacing="0.5">RECORD</text>`;
  html += `<text x="${cx}" y="${cy+10}" text-anchor="middle" font-family="Oswald, sans-serif" font-size="14" font-weight="600" fill="var(--ink)" id="centerStageLabel">01/06</text>`;
  STAGES.forEach((s,i)=>{
    const a = (Math.PI*2*i/6) - Math.PI/2;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    const statusClass = stageStatus[i]==='done' ? 'done' : '';
    html += `
      <g class="stage-dot ${statusClass}" data-stage="${i}" onclick="goToStage(${i})">
        <circle class="stage-dot-bg" cx="${x}" cy="${y}" r="15"></circle>
        <text class="stage-dot-label" x="${x}" y="${y+4.5}" text-anchor="middle">${s.code}</text>
      </g>`;
  });
  svg.innerHTML = html;
}

function refreshCycleActive(){
  document.querySelectorAll('.stage-dot').forEach(el=>{
    const idx = parseInt(el.getAttribute('data-stage'));
    el.classList.toggle('active', idx === currentStage);
  });
  const lbl = document.getElementById('centerStageLabel');
  if(lbl) lbl.textContent = STAGES[currentStage].code + '/06';
}

function goToStage(i){ currentStage = i; renderSme(); }

/* =====================================================================
   MODE SWITCH
===================================================================== */
document.getElementById('modeSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('.mode-btn');
  if(!btn) return;
  currentMode = btn.getAttribute('data-mode');
  render();
});

function render(){
  // Harbour Lane sees SME workspace; external accounts see stakeholder view only.
  // Everyone can see Regulatory coverage.
  const isHarbourLane = session.account.id === 'harbourlane';
  document.querySelectorAll('.mode-btn').forEach(b=>{
    const m = b.getAttribute('data-mode');
    b.classList.toggle('active', m===currentMode);
    b.style.display = (m==='sme' && !isHarbourLane) ? 'none' : '';
  });
  if(currentMode==='sme') renderSme();
  else if(currentMode==='regulatory') renderRegulatory();
  else renderStakeholder();
}

/* =====================================================================
   SME WORKSPACE
===================================================================== */
function renderSme(){
  const s = STAGES[currentStage];
  const tabsHtml = STAGES.map(st=>
    `<div class="stage-tab ${st.id===currentStage?'active':''}" data-stage="${st.id}">${st.code} · ${st.short}</div>`
  ).join('');

  document.getElementById('modeContent').innerHTML = `
    <div class="scenario-banner">
      <span>🏢</span>
      <div><b>Demo scenario:</b> Harbour Lane Sourcing is a Hong Kong trading/sourcing SME, placing orders with 6 manufacturing partners in Mainland China and Vietnam on behalf of 3 overseas retail brands. It sits between brand and factory — most of its real risk exposure is upstream, not on its own premises.</div>
    </div>

    <div class="cycle-wrap">
      <div class="cycle-svg-holder"><svg id="cycleSvg" width="172" height="172" viewBox="0 0 172 172"></svg></div>
      <div class="cycle-info">
        <div class="cycle-eyebrow">Step ${s.code} / 06</div>
        <h1 class="cycle-title">${s.title}</h1>
        <p class="cycle-desc">${s.desc}</p>
        <div class="cycle-source">Cycle structure follows the OECD Due Diligence Guidance for Responsible Business Conduct (2018) and the UN Guiding Principles on Business and Human Rights.</div>
      </div>
    </div>

    <div class="stage-tabs" id="stageTabsWrap">${tabsHtml}</div>
    <div id="panels"><div class="panel active">${PANEL_BUILDERS[currentStage]()}</div></div>

    <div class="footer-nav">
      <button class="btn btn-ghost" id="prevBtn" style="visibility:${currentStage===0?'hidden':'visible'}">← Previous step</button>
      <button class="btn" id="nextBtn">${currentStage===5?'Restart cycle ↻':'Next step →'}</button>
    </div>
  `;

  buildCycleSvg();
  refreshCycleActive();

  document.getElementById('stageTabsWrap').addEventListener('click', (e)=>{
    const t = e.target.closest('.stage-tab'); if(!t) return;
    currentStage = parseInt(t.getAttribute('data-stage')); renderSme();
  });
  document.getElementById('prevBtn').onclick = ()=>{ if(currentStage>0){ currentStage--; renderSme(); } };
  document.getElementById('nextBtn').onclick = ()=>{ currentStage = currentStage===5?0:currentStage+1; renderSme(); };

  attachThreadHandlers();
  attachSubmitHandlers();
  attachUploadHandlers();
}

/* ---------- Evidence chip + thread helper markup ---------- */
function evidenceChip(type){
  const map = {
    survey: ['ev-survey','📋','Self-disclosure survey'],
    document: ['ev-document','📄','Document upload'],
    audit: ['ev-audit','🔍','Third-party audit'],
  };
  const [cls, icon, label] = map[type];
  return `<span class="evidence-chip ${cls}">${icon} ${label}</span>`;
}

function thread(id, comments){
  const commentsHtml = comments.map(c=>`
    <div class="comment ${c.role==='ai'?'ai-comment':''}">
      <div class="comment-avatar av-${c.role}">${c.role==='ai'?'▣':c.initials}</div>
      <div class="comment-body">
        <div class="comment-name">${c.name}<span class="role">${c.roleLabel}</span></div>
        <div class="comment-text">${c.text}</div>
      </div>
    </div>`).join('');

  return `
    <div class="thread">
      <div class="thread-toggle" data-thread="${id}">💬 ${comments.length} comment${comments.length===1?'':'s'} — view thread</div>
      <div class="thread-body" id="thread-${id}">
        ${commentsHtml}
        <div class="comment-input-row">
          <input class="demo-input" placeholder="Add a comment..." id="input-${id}">
          <button class="btn btn-sm" data-reply="${id}">Send</button>
        </div>
      </div>
    </div>`;
}

function attachThreadHandlers(){
  document.querySelectorAll('.thread-toggle').forEach(t=>{
    t.onclick = ()=>{
      const body = document.getElementById('thread-' + t.getAttribute('data-thread'));
      body.classList.toggle('open');
    };
  });
  document.querySelectorAll('[data-reply]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.getAttribute('data-reply');
      const input = document.getElementById('input-' + id);
      const body = document.getElementById('thread-' + id);
      if(!input.value.trim()) return;
      const u = session.user;
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `
        <div class="comment-avatar ${u.avatarClass}">${u.initials}</div>
        <div class="comment-body">
          <div class="comment-name">${u.name} <span class="role">${session.account.name}</span></div>
          <div class="comment-text">${input.value}</div>
        </div>`;
      body.insertBefore(div, input.closest('.comment-input-row'));
      input.value='';
      // simulate AI joining the thread
      setTimeout(()=>{
        const aiDiv = document.createElement('div');
        aiDiv.className = 'comment ai-comment';
        aiDiv.innerHTML = `
          <div class="comment-avatar av-ai">▣</div>
          <div class="comment-body">
            <div class="comment-name">DueReady AI <span class="role">assistant</span></div>
            <div class="comment-text">Noted. I'll flag this update to anyone reviewing this item, and reflect it next time a stakeholder report is generated.</div>
          </div>`;
        body.insertBefore(aiDiv, input.closest('.comment-input-row'));
      }, 500);
    };
  });
}

function attachSubmitHandlers(){
  document.querySelectorAll('[data-ai-submit]').forEach(btn=>{
    btn.onclick = ()=>{
      const targetId = btn.getAttribute('data-ai-submit');
      const out = document.getElementById(targetId);
      if(!out) return;
      out.innerHTML = `<div class="empty-note">▣ AI is reviewing the submission...</div>`;
      setTimeout(()=>{ out.innerHTML = AI_RESPONSES[targetId] || ''; }, 700);
    };
  });
}

function attachUploadHandlers(){
  const zone = document.getElementById('uploadZone');
  const input = document.getElementById('fileInput');
  if(!zone || !input) return;

  document.querySelectorAll('.doc-type-btn').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.doc-type-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedDocType = btn.getAttribute('data-doctype');
    };
  });

  zone.onclick = ()=>{
    if(!currentPermissions().canSubmit){
      document.getElementById('uploadResults').innerHTML =
        `<div class="lock-note" style="margin-top:10px;">Your role (${session.user.level}) is read-only — uploads are not available on this seat.</div>`;
      return;
    }
    input.click();
  };

  input.onchange = ()=>{
    if(!input.files || !input.files.length) return;
    const file = input.files[0];
    const results = document.getElementById('uploadResults');
    const docInfo = DOC_TYPE_ANALYSIS[selectedDocType];

    results.innerHTML = `
      <div class="upload-progress">
        <div class="upload-file-row">
          <div class="upload-file-name">${docInfo.icon} ${file.name}</div>
          <div class="upload-status processing" id="uploadStatusLabel">Uploading...</div>
        </div>
      </div>`;

    setTimeout(()=>{
      const label = document.getElementById('uploadStatusLabel');
      if(label){ label.textContent = 'Analysing with AI...'; }
    }, 600);

    setTimeout(()=>{
      const label = document.getElementById('uploadStatusLabel');
      if(label){ label.textContent = 'Analysis complete'; label.classList.remove('processing'); label.classList.add('done'); }
      const analysisDiv = document.createElement('div');
      analysisDiv.innerHTML = docInfo.analysis;
      results.appendChild(analysisDiv);
    }, 1700);
  };
}

function renderStakeholder(){
  const isHarbourLane = session.account.id === 'harbourlane';
  // External accounts are locked to their own stakeholder identity; only Harbour Lane can browse all views.
  const visibleStakeholders = isHarbourLane ? STAKEHOLDERS : STAKEHOLDERS.filter(sh => sh.id === currentStakeholder);

  const chipsHtml = visibleStakeholders.map(sh => `
    <div class="sh-chip ${sh.id===currentStakeholder?'active':''} ${isHarbourLane?'':'locked'}" data-sh="${sh.id}" ${isHarbourLane?'':'title="Your account is logged in as this stakeholder"'}>
      <div class="sh-avatar" style="background: var(--paper-2);">${sh.icon}</div>
      <div>
        <div class="sh-name">${sh.name}</div>
        <div class="sh-meta">${sh.meta}</div>
      </div>
    </div>`).join('');

  if(!currentReportTab[currentStakeholder]){
    currentReportTab[currentStakeholder] = STAKEHOLDER_REPORTS[currentStakeholder][0].id;
  }
  const reports = STAKEHOLDER_REPORTS[currentStakeholder];
  const tabsHtml = reports.map(r =>
    `<div class="report-tab ${r.id===currentReportTab[currentStakeholder]?'active':''}" data-report="${r.id}">${r.label}</div>`
  ).join('');
  const activeReport = reports.find(r => r.id === currentReportTab[currentStakeholder]);

  const bannerText = isHarbourLane
    ? "Collaboration layer: the same underlying evidence from Harbour Lane's workspace, reshaped per stakeholder by AI, with a live comment thread back to the SME."
    : `You're viewing the ${STAKEHOLDERS.find(s=>s.id===currentStakeholder).name} report — generated by AI from Harbour Lane's underlying due diligence record. Comments here go directly to Harbour Lane.`;

  const regenBtn = permGate(`<button class="btn btn-ghost btn-sm">▣ Regenerate report from latest data</button>`,
    'Viewer seats cannot trigger report regeneration');

  document.getElementById('modeContent').innerHTML = `
    <div class="scenario-banner" style="border-color: var(--petrol); color:#1B3536;">
      <span>🔗</span>
      <div><b>${isHarbourLane?'Collaboration layer':'Stakeholder report'}:</b> ${bannerText}</div>
    </div>

    ${isHarbourLane ? '<div class="section-label">Choose a stakeholder to view as</div>' : ''}
    <div class="stakeholder-bar" id="stakeholderBar">${chipsHtml}</div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:10px;">
      <div class="report-tabs" id="reportTabs">${tabsHtml}</div>
      ${regenBtn}
    </div>

    <div id="reportContent">${activeReport.content}</div>
  `;

  document.getElementById('stakeholderBar').addEventListener('click', (e)=>{
    if(!isHarbourLane) return; // locked for external accounts
    const chip = e.target.closest('.sh-chip'); if(!chip) return;
    currentStakeholder = chip.getAttribute('data-sh');
    renderStakeholder();
  });
  document.getElementById('reportTabs').addEventListener('click', (e)=>{
    const tab = e.target.closest('.report-tab'); if(!tab) return;
    currentReportTab[currentStakeholder] = tab.getAttribute('data-report');
    renderStakeholder();
  });

  attachThreadHandlers();
}
